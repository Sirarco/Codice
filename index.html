<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Códice - Escritor IA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4ecca3">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3596/3596045.png">

    <style>
        :root { --bg: #1a1a2e; --container-bg: #16213e; --accent: #4ecca3; --text: #eef; --error: #e94560; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { background: var(--container-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; border: 1px solid #0f3460; box-sizing: border-box; }
        h1 { color: var(--accent); font-size: 1.4rem; margin-bottom: 15px; text-align: center; }
        textarea { width: 100%; height: 150px; background: #0f3460; border: 1px solid #1a1a2e; border-radius: 8px; color: white; padding: 15px; font-size: 16px; resize: none; box-sizing: border-box; margin-bottom: 15px; }
        button { background-color: var(--accent); color: var(--bg); border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #2c3e50; color: #7f8c8d; }
        #response { margin-top: 20px; padding: 15px; background: #0f3460; border-radius: 8px; border-left: 5px solid var(--accent); white-space: pre-wrap; display: none; line-height: 1.6; font-size: 0.95rem; }
        .error { border-left-color: var(--error); color: var(--error); }
    </style>
</head>
<body>

    <div class="container">
        <h1>El Códice - Auxiliar de Escritura</h1>
        <textarea id="promptInput" placeholder="Describe una escena o consulta una regla de tu mundo..."></textarea>
        <button id="btnAsk">Consultar a la IA</button>
        <div id="response"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyBUM5TWtx0-YOlatjexIs3ehLw58vwDPBk";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const btn = document.getElementById('btnAsk');
        const input = document.getElementById('promptInput');
        const responseDiv = document.getElementById('response');

        btn.addEventListener('click', async () => {
            const prompt = input.value.trim();
            if (!prompt) return;

            btn.disabled = true;
            btn.innerText = "Pensando...";
            responseDiv.style.display = 'none';
            responseDiv.classList.remove('error');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    responseDiv.innerText = data.candidates[0].content.parts[0].text;
                    responseDiv.style.display = 'block';
                }
            } catch (error) {
                responseDiv.innerText = "⚠️ Error: " + error.message;
                responseDiv.classList.add('error');
                responseDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = "Consultar a la IA";
            }
        });

        // REGISTRO DEL SERVICE WORKER PARA PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA lista'))
                .catch(err => console.log('Error de PWA', err));
            });
        }
    </script>
</body>
</html>
